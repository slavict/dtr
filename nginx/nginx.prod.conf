upstream django_app {
    server django:8000;
}

server {
    listen 80;

    # React build assets (must come before Django /static/)
    location /static/js/ {
        alias /usr/share/nginx/html/static/js/;
    }

    location /static/css/ {
        alias /usr/share/nginx/html/static/css/;
    }

    # Django collected static (admin, DRF, etc.)
    location /static/ {
        alias /home/src/app/static/;
    }

    location /media/ {
        alias /home/src/app/media/;
    }

    location /admin/ {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /users/ {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /user {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
