upstream django_app {
    # Backend servers to proxy to
    server django:8000;
}
server {
    listen 80;
    # Proxy settings
    location / {
        # Requests to the root URL are forwarded to one of the servers
        # in the django_app upstream
        proxy_pass http://django_app;
        # Set proxy headers
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        # Disable redirect rewriting
        proxy_redirect off;
    }
    # Static and media files
    location /static/ {
        alias /home/src/app/static/;
    }
    location /media/ {
        alias /home/src/app/media/;
   }
}
